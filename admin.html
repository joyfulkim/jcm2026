<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>관리자 · 조이플 미션 컨퍼런스 2026</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
  body { font-family: 'Pretendard', sans-serif; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation: fadeIn .4s ease; }
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<!-- Login Screen -->
<div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-xl p-10 w-full max-w-sm fade-in">
    <div class="text-center mb-8">
      <img src="logo.png" alt="JMC" class="h-12 mx-auto mb-4">
      <h1 class="text-xl font-extrabold text-slate-800">관리자 로그인</h1>
      <p class="text-sm text-slate-400 mt-1">조이플 미션 컨퍼런스 2026</p>
    </div>
    <div class="space-y-4">
      <input id="pw-input" type="password" placeholder="비밀번호 입력"
        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-orange-400 focus:ring-2 focus:ring-orange-100 outline-none text-sm"
        onkeydown="if(event.key==='Enter') tryLogin()"/>
      <p id="pw-err" class="text-red-500 text-xs hidden">비밀번호가 올바르지 않습니다.</p>
      <button onclick="tryLogin()"
        class="w-full py-3 rounded-xl bg-orange-500 text-white font-bold hover:bg-orange-600 transition">
        로그인
      </button>
    </div>
  </div>
</div>

<!-- Admin Dashboard -->
<div id="dashboard" class="hidden fade-in">

  <!-- Top Nav -->
  <header class="bg-white border-b border-slate-100 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="JMC" class="h-9">
        <div>
          <div class="font-extrabold text-slate-800">관리자 페이지</div>
          <div class="text-xs text-orange-500 font-semibold">Joyful Mission Conference 2026</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="exportCSV()"
          class="px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-sm font-bold transition flex items-center gap-1.5">
          📥 CSV 내보내기
        </button>
        <button onclick="logout()"
          class="px-4 py-2 rounded-xl bg-red-50 hover:bg-red-100 text-red-600 text-sm font-bold transition">
          로그아웃
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats"></div>

    <!-- Table -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
        <h2 class="font-extrabold text-slate-800">신청자 목록</h2>
        <span id="count-badge" class="text-xs bg-orange-100 text-orange-700 font-bold px-3 py-1 rounded-full"></span>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden py-20 text-center">
        <div class="text-5xl mb-4">📋</div>
        <p class="text-slate-400 font-medium">아직 신청자가 없습니다.</p>
      </div>

      <!-- Table -->
      <div class="overflow-x-auto">
        <table class="w-full text-sm" id="reg-table">
          <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wider">
            <tr>
              <th class="px-5 py-3 text-left font-bold">#</th>
              <th class="px-5 py-3 text-left font-bold">이름</th>
              <th class="px-5 py-3 text-left font-bold">연락처</th>
              <th class="px-5 py-3 text-left font-bold">이메일</th>
              <th class="px-5 py-3 text-left font-bold">소속</th>
              <th class="px-5 py-3 text-left font-bold">참석 집회</th>
              <th class="px-5 py-3 text-left font-bold">메모</th>
              <th class="px-5 py-3 text-left font-bold">신청일시</th>
              <th class="px-5 py-3 text-left font-bold">삭제</th>
            </tr>
          </thead>
          <tbody id="reg-tbody" class="divide-y divide-slate-50"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
const STORAGE_KEY = 'jmc2026_registrations';
const ADMIN_PW    = 'jmc2026';   // ← 비밀번호 변경 가능

const SESSION_SHORT = {
  '첫째날 저녁 집회': '첫날 저녁',
  '둘째날 오전 집회': '둘째날 오전',
  '둘째날 오후 집회': '둘째날 오후',
};

function tryLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PW) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    renderDashboard();
  } else {
    document.getElementById('pw-err').classList.remove('hidden');
  }
}

function logout() {
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('pw-input').value = '';
}

function getRegs() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}

function renderDashboard() {
  const regs = getRegs();

  // Stats
  const s1 = regs.filter(r => r.sessions?.includes('첫째날 저녁 집회')).length;
  const s2 = regs.filter(r => r.sessions?.includes('둘째날 오전 집회')).length;
  const s3 = regs.filter(r => r.sessions?.includes('둘째날 오후 집회')).length;

  document.getElementById('stats').innerHTML = `
    ${statCard('👥', '총 신청자', regs.length + '명', 'orange')}
    ${statCard('🌙', '첫날 저녁', s1 + '명', 'blue')}
    ${statCard('☀️', '둘째날 오전', s2 + '명', 'amber')}
    ${statCard('🌤️', '둘째날 오후', s3 + '명', 'green')}
  `;

  document.getElementById('count-badge').textContent = `총 ${regs.length}명`;

  if (regs.length === 0) {
    document.getElementById('empty-state').classList.remove('hidden');
    document.getElementById('reg-table').classList.add('hidden');
    return;
  }
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('reg-table').classList.remove('hidden');

  const tbody = document.getElementById('reg-tbody');
  tbody.innerHTML = [...regs].reverse().map((r, i) => `
    <tr class="hover:bg-orange-50/40 transition">
      <td class="px-5 py-4 text-slate-400 font-mono text-xs">${regs.length - i}</td>
      <td class="px-5 py-4 font-bold text-slate-800">${esc(r.name)}</td>
      <td class="px-5 py-4 text-slate-600">${esc(r.phone)}</td>
      <td class="px-5 py-4 text-slate-500 text-xs">${esc(r.email || '—')}</td>
      <td class="px-5 py-4 text-slate-600">${esc(r.church)}</td>
      <td class="px-5 py-4">
        <div class="flex flex-wrap gap-1">
          ${(r.sessions||[]).map(s => `<span class="px-2 py-0.5 rounded-full bg-orange-100 text-orange-700 text-xs font-bold">${SESSION_SHORT[s]||s}</span>`).join('')}
        </div>
      </td>
      <td class="px-5 py-4 text-slate-400 text-xs max-w-[140px] truncate">${esc(r.note || '—')}</td>
      <td class="px-5 py-4 text-slate-400 text-xs whitespace-nowrap">${esc(r.timestamp)}</td>
      <td class="px-5 py-4">
        <button onclick="deleteReg(${r.id})" class="text-red-400 hover:text-red-600 text-xs font-bold transition">삭제</button>
      </td>
    </tr>
  `).join('');
}

function statCard(icon, label, value, color) {
  const colors = {
    orange: 'bg-orange-50 border-orange-100 text-orange-600',
    blue:   'bg-blue-50 border-blue-100 text-blue-600',
    amber:  'bg-amber-50 border-amber-100 text-amber-600',
    green:  'bg-green-50 border-green-100 text-green-600',
  };
  return `
    <div class="rounded-2xl border p-5 ${colors[color]}">
      <div class="text-2xl mb-2">${icon}</div>
      <div class="text-2xl font-extrabold">${value}</div>
      <div class="text-xs font-semibold mt-0.5 opacity-70">${label}</div>
    </div>`;
}

function deleteReg(id) {
  if (!confirm('이 신청을 삭제하시겠습니까?')) return;
  const regs = getRegs().filter(r => r.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(regs));
  renderDashboard();
}

function exportCSV() {
  const regs = getRegs();
  if (regs.length === 0) { alert('신청자가 없습니다.'); return; }
  const headers = ['번호','이름','연락처','이메일','소속','첫날저녁','둘째날오전','둘째날오후','메모','신청일시'];
  const rows = regs.map((r, i) => [
    i + 1,
    r.name, r.phone, r.email, r.church,
    r.sessions?.includes('첫째날 저녁 집회') ? 'O' : '',
    r.sessions?.includes('둘째날 오전 집회') ? 'O' : '',
    r.sessions?.includes('둘째날 오후 집회') ? 'O' : '',
    r.note, r.timestamp
  ].map(v => `"${String(v||'').replace(/"/g,'""')}"`));

  const csv = '\uFEFF' + [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `jmc2026_신청자_${new Date().toLocaleDateString('ko-KR').replace(/\s/g,'')}.csv`;
  a.click();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
